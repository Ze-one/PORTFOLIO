
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="/src/imports/IMG-20260425-WA0106.png" />
      <link rel="apple-touch-icon" href="/src/imports/IMG-20260425-WA0106.png" />
      <title>ABDEL_samad</title>
      <meta name="description" content="Showcases a professional IT engineer&#39;s expertise in networking, cybersecurity, and virtualization through an interactive, animated portfolio with CV download and contact features." />
      <meta name="robots" content="noindex, nofollow" />
      <style>
        html, body { height: 100%; margin: 0; }
        #root { height: 100%; }
        #portfolio-chatbot * { box-sizing: border-box; }
        #portfolio-chatbot {
          position: fixed;
          right: 22px;
          bottom: 22px;
          z-index: 9999;
          font-family: Inter, Arial, sans-serif;
        }
        #portfolio-chatbot-toggle {
          width: 62px;
          height: 62px;
          border-radius: 999px;
          border: 1px solid rgba(34, 211, 238, 0.55);
          background: linear-gradient(135deg, #2563eb, #06b6d4, #7c3aed);
          color: #fff;
          box-shadow: 0 18px 40px rgba(37, 99, 235, 0.35);
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 28px;
        }
        #portfolio-chatbot-panel {
          position: absolute;
          right: 0;
          bottom: 78px;
          width: min(380px, calc(100vw - 28px));
          height: 540px;
          max-height: calc(100vh - 120px);
          display: none;
          flex-direction: column;
          overflow: hidden;
          border-radius: 24px;
          border: 1px solid rgba(255,255,255,0.12);
          background: rgba(5, 8, 22, 0.97);
          backdrop-filter: blur(18px);
          box-shadow: 0 22px 70px rgba(0,0,0,0.55);
        }
        #portfolio-chatbot.open #portfolio-chatbot-panel { display: flex; }
        .pc-header {
          padding: 18px 18px 14px;
          background: linear-gradient(135deg, rgba(37,99,235,0.28), rgba(34,211,238,0.12));
          border-bottom: 1px solid rgba(255,255,255,0.08);
          color: #fff;
        }
        .pc-title { font-weight: 800; font-size: 15px; letter-spacing: .03em; margin: 0; }
        .pc-subtitle { color: #94a3b8; margin: 5px 0 0; font-size: 12px; line-height: 1.4; }
        .pc-messages {
          flex: 1;
          overflow-y: auto;
          padding: 16px;
          display: flex;
          flex-direction: column;
          gap: 10px;
        }
        .pc-message {
          max-width: 86%;
          padding: 10px 12px;
          border-radius: 16px;
          font-size: 13px;
          line-height: 1.45;
          white-space: pre-wrap;
        }
        .pc-bot {
          align-self: flex-start;
          color: #dbeafe;
          background: rgba(37, 99, 235, 0.16);
          border: 1px solid rgba(59, 130, 246, 0.18);
        }
        .pc-user {
          align-self: flex-end;
          color: #fff;
          background: rgba(34, 211, 238, 0.15);
          border: 1px solid rgba(34, 211, 238, 0.22);
        }
        .pc-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          padding: 0 16px 12px;
        }
        .pc-chip, .pc-wa, .pc-email {
          border: 1px solid rgba(255,255,255,0.12);
          background: rgba(255,255,255,0.04);
          color: #cbd5e1;
          border-radius: 999px;
          padding: 8px 10px;
          font-size: 12px;
          cursor: pointer;
          text-decoration: none;
        }
        .pc-wa {
          background: rgba(34, 197, 94, 0.14);
          color: #86efac;
          border-color: rgba(34, 197, 94, 0.25);
        }
        .pc-email {
          background: rgba(34, 211, 238, 0.12);
          color: #67e8f9;
          border-color: rgba(34, 211, 238, 0.25);
        }
        .pc-input-row {
          display: flex;
          gap: 8px;
          padding: 12px;
          border-top: 1px solid rgba(255,255,255,0.08);
        }
        #pc-input {
          flex: 1;
          min-width: 0;
          border-radius: 14px;
          border: 1px solid rgba(255,255,255,0.12);
          background: rgba(255,255,255,0.04);
          color: #fff;
          padding: 11px 12px;
          outline: none;
          font-size: 13px;
        }
        #pc-send {
          border: 0;
          border-radius: 14px;
          padding: 0 14px;
          background: #2563eb;
          color: #fff;
          cursor: pointer;
          font-weight: 700;
        }
        #back-to-top-btn {
          position: fixed;
          right: 31px;
          bottom: 98px;
          z-index: 9998;
          width: 48px;
          height: 48px;
          border-radius: 999px;
          border: 1px solid rgba(34, 211, 238, 0.45);
          background: rgba(5, 8, 22, 0.82);
          color: #67e8f9;
          box-shadow: 0 14px 32px rgba(0, 0, 0, 0.35), 0 0 22px rgba(34, 211, 238, 0.12);
          backdrop-filter: blur(14px);
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 24px;
          line-height: 1;
          opacity: 0;
          transform: translateY(14px) scale(0.94);
          pointer-events: none;
          transition: opacity 0.25s ease, transform 0.25s ease, border-color 0.25s ease, color 0.25s ease;
        }
        #back-to-top-btn.visible {
          opacity: 1;
          transform: translateY(0) scale(1);
          pointer-events: auto;
        }
        #back-to-top-btn:hover {
          color: #fff;
          border-color: rgba(34, 211, 238, 0.8);
          transform: translateY(-2px) scale(1.04);
        }
        @media (max-width: 520px) {
          #portfolio-chatbot { right: 14px; bottom: 14px; }
          #portfolio-chatbot-panel { height: 76vh; }
          #back-to-top-btn { right: 21px; bottom: 86px; width: 44px; height: 44px; }
        }
      </style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script>
        window.__PORTFOLIO_CONTACT_ENABLED__ = true;
        window.__PORTFOLIO_CONTACT_EMAIL__ = 'abdel.samad@etsntech.org';
        window.__PORTFOLIO_WHATSAPP__ = '237640116221';

        function normalizePortfolioEmails() {
          const correctEmail = window.__PORTFOLIO_CONTACT_EMAIL__;
          const wrongEmails = [
            'abdel.samad@etsntechl.org',
            'abdel.samad@etsntech.org',
            'abdel.samad@ets.ntech.org'
          ];

          const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          const nodes = [];
          while (walker.nextNode()) nodes.push(walker.currentNode);
          nodes.forEach(function (node) {
            wrongEmails.forEach(function (wrong) {
              if (node.nodeValue && node.nodeValue.includes(wrong)) {
                node.nodeValue = node.nodeValue.split(wrong).join(correctEmail);
              }
            });
          });

          document.querySelectorAll('a[href]').forEach(function (a) {
            const href = a.getAttribute('href') || '';
            wrongEmails.forEach(function (wrong) {
              if (href.includes(wrong)) a.setAttribute('href', href.split(wrong).join(correctEmail));
            });
          });
        }

        const normalizeTimer = setInterval(normalizePortfolioEmails, 700);
        window.addEventListener('load', function () {
          normalizePortfolioEmails();
          setTimeout(function () { clearInterval(normalizeTimer); normalizePortfolioEmails(); }, 8000);
        });

        document.addEventListener('submit', async function (event) {
          const form = event.target;
          if (!(form instanceof HTMLFormElement)) return;

          const nameInput = form.querySelector('#contact-name');
          const emailInput = form.querySelector('#contact-email');
          const subjectInput = form.querySelector('#contact-subject');
          const messageInput = form.querySelector('#contact-message');
          if (!nameInput || !emailInput || !subjectInput || !messageInput) return;

          event.preventDefault();
          event.stopPropagation();
          if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();

          const button = form.querySelector('button[type="submit"]');
          const originalButtonHtml = button ? button.innerHTML : '';
          const setButton = (html, disabled) => {
            if (!button) return;
            button.innerHTML = html;
            button.disabled = disabled;
          };

          setButton('Sending...', true);

          try {
            const response = await fetch('/api/contact', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: nameInput.value,
                email: emailInput.value,
                subject: subjectInput.value,
                message: messageInput.value,
                website: ''
              })
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(data.error || 'Message could not be sent.');

            form.innerHTML = '<div style="text-align:center;padding:48px 16px;color:white"><div style="font-size:42px;margin-bottom:12px;color:#4ade80">✓</div><h3 style="font-size:20px;font-weight:700;margin:0 0 8px">Message sent!</h3><p style="color:#94a3b8;margin:0">Your message has been sent to abdel.samad@etsntech.org.</p></div>';
          } catch (error) {
            alert(error && error.message ? error.message : 'Message could not be sent. Please try again or email directly.');
            setButton(originalButtonHtml || 'Send Message', false);
          }
        }, true);

        function initBackToTopButton() {
          if (document.getElementById('back-to-top-btn')) return;
          const btn = document.createElement('button');
          btn.id = 'back-to-top-btn';
          btn.type = 'button';
          btn.setAttribute('aria-label', 'Back to top');
          btn.title = 'Back to top';
          btn.innerHTML = '↑';
          document.body.appendChild(btn);

          function updateVisibility() {
            if (window.scrollY > 420) btn.classList.add('visible');
            else btn.classList.remove('visible');
          }

          btn.addEventListener('click', function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
          window.addEventListener('scroll', updateVisibility, { passive: true });
          updateVisibility();
        }

        function initPortfolioChatbot() {
          if (document.getElementById('portfolio-chatbot')) return;
          const email = window.__PORTFOLIO_CONTACT_EMAIL__;
          const whatsappNumber = window.__PORTFOLIO_WHATSAPP__;
          const whatsappText = encodeURIComponent('Hello Abdel Samad, I visited your portfolio and would like to contact you.');
          const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${whatsappText}`;
          const emailUrl = `mailto:${email}?subject=${encodeURIComponent('Portfolio Contact')}&body=${encodeURIComponent('Hello Abdel Samad, I visited your portfolio and would like to contact you.')}`;
          const answers = [
            {
              keys: ['who', 'about', 'profile', 'yourself', 'introduce'],
              text: 'I am PEPOUERE NGOUH ABDEL SAMAD, an IT Engineer and Networking & Security Specialist based in Yaoundé, Cameroon. I focus on designing, securing, virtualizing and monitoring enterprise IT infrastructure.'
            },
            {
              keys: ['old', 'age', 'how old'],
              text: 'I prefer to keep my exact age private on the public portfolio. What I can say is that I am a young, active IT professional with hands-on experience in networking, cybersecurity, virtualization and infrastructure monitoring.'
            },
            {
              keys: ['pressure', 'under pressure', 'stress', 'deadline', 'difficult situation'],
              text: 'Under pressure, I stay calm and structured. I first identify the real priority, break the issue into smaller parts, communicate clearly, and focus on solving the most critical problem first. In IT, pressure is normal, especially during incidents, so I rely on documentation, testing and teamwork.'
            },
            {
              keys: ['strength', 'strong', 'best quality'],
              text: 'My strongest qualities are problem-solving, adaptability, communication and the ability to connect networking, security and systems thinking into practical solutions.'
            },
            {
              keys: ['weakness', 'improve', 'challenge'],
              text: 'One area I continuously improve is balancing speed with documentation. I can move fast technically, but I also make sure solutions are documented so teams can maintain them properly.'
            },
            {
              keys: ['skill', 'skills', 'technology', 'stack'],
              text: 'My core skills include Cisco networking, routing and switching, VLANs, FortiGate, Palo Alto, SSL VPN, FortiClient, Proxmox virtualization, Prometheus, Grafana, IT support and technical documentation.'
            },
            {
              keys: ['experience', 'work', 'job'],
              text: 'I have hands-on experience at ETS NTECH designing enterprise networks, implementing cybersecurity solutions, building Proxmox hosting environments, and deploying monitoring systems.'
            },
            {
              keys: ['project', 'projects'],
              text: 'Key projects include enterprise network deployment, secure teleworking with SSL VPN, virtualized hosting with Proxmox, and infrastructure monitoring with Prometheus and Grafana.'
            },
            {
              keys: ['education', 'certificate', 'certification'],
              text: 'My background includes Computer Network Engineering, Network & Security studies, and certifications such as Cisco Cybersecurity Essentials and CompTIA Security+.'
            },
            {
              keys: ['why hire', 'hire you', 'opportunity', 'available', 'collaborate'],
              text: 'I bring practical field experience, a strong learning mindset, and the ability to design solutions that are secure, scalable and useful for real users. I am available for IT, networking and cybersecurity opportunities.'
            },
            {
              keys: ['contact', 'whatsapp', 'phone', 'hire', 'email', 'mail', 'reach'],
              text: 'You can contact me by email at abdel.samad@etsntech.org or continue directly on WhatsApp. Use either contact button below.',
              contact: true
            }
          ];

          const bot = document.createElement('div');
          bot.id = 'portfolio-chatbot';
          bot.innerHTML = `
            <div id="portfolio-chatbot-panel" aria-label="Portfolio chatbot">
              <div class="pc-header">
                <p class="pc-title">Ask about Abdel Samad</p>
                <p class="pc-subtitle">I can answer questions about skills, experience, projects, pressure handling and contact options.</p>
              </div>
              <div class="pc-messages" id="pc-messages"></div>
              <div class="pc-actions">
                <button class="pc-chip" data-question="Who are you?">Who are you?</button>
                <button class="pc-chip" data-question="How old are you?">Age</button>
                <button class="pc-chip" data-question="How do you feel under pressure?">Pressure</button>
                <button class="pc-chip" data-question="What are your skills?">Skills</button>
                <button class="pc-chip" data-question="How can I contact you?">Contact</button>
                <a class="pc-wa" href="${whatsappUrl}" target="_blank" rel="noopener noreferrer">WhatsApp Abdel</a>
                <a class="pc-email" href="${emailUrl}">Email Abdel</a>
              </div>
              <div class="pc-input-row">
                <input id="pc-input" type="text" placeholder="Ask a question..." />
                <button id="pc-send" type="button">Send</button>
              </div>
            </div>
            <button id="portfolio-chatbot-toggle" type="button" aria-label="Open portfolio chatbot">💬</button>
          `;
          document.body.appendChild(bot);

          const messages = document.getElementById('pc-messages');
          const input = document.getElementById('pc-input');
          const send = document.getElementById('pc-send');
          const toggle = document.getElementById('portfolio-chatbot-toggle');

          function addMessage(text, from) {
            const div = document.createElement('div');
            div.className = `pc-message ${from === 'user' ? 'pc-user' : 'pc-bot'}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
          }

          function addContactPrompt() {
            const div = document.createElement('div');
            div.className = 'pc-message pc-bot';
            div.innerHTML = `You can reach Abdel Samad through either option:<br><br><a class="pc-wa" href="${whatsappUrl}" target="_blank" rel="noopener noreferrer">WhatsApp Abdel</a> <a class="pc-email" href="${emailUrl}">Email Abdel</a>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
          }

          function reply(question) {
            const q = String(question || '').trim();
            if (!q) return;
            addMessage(q, 'user');
            const lower = q.toLowerCase();
            const match = answers.find(function (item) { return item.keys.some(function (key) { return lower.includes(key); }); });
            if (match) {
              addMessage(match.text, 'bot');
              if (match.contact) addContactPrompt();
              return;
            }
            addMessage('I can help with questions about Abdel Samad’s profile, age, pressure handling, skills, projects, experience, education and contact options. For a direct discussion, you can contact him by email or WhatsApp.', 'bot');
            addContactPrompt();
          }

          toggle.addEventListener('click', function () {
            bot.classList.toggle('open');
            if (bot.classList.contains('open') && messages.children.length === 0) {
              addMessage('Hello, I am Abdel Samad’s portfolio assistant. Ask me about his skills, projects, experience, pressure handling, or how to contact him.', 'bot');
            }
          });
          send.addEventListener('click', function () { reply(input.value); input.value = ''; input.focus(); });
          input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { reply(input.value); input.value = ''; }
          });
          document.querySelectorAll('.pc-chip').forEach(function (chip) {
            chip.addEventListener('click', function () { reply(chip.getAttribute('data-question')); });
          });
        }

        window.addEventListener('load', function () {
          initBackToTopButton();
          initPortfolioChatbot();
        });
      </script>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
